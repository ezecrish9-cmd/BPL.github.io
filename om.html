<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Om - Bottlers Premier League</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        body { background-color: #0b0f19; color: #e2e8f0; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        .glow-effect { box-shadow: 0 0 20px rgba(249, 115, 22); }
        .glow-effect:hover { box-shadow: 0 0 30px rgba(249, 115, 22, 0.4); transition: all 0.3s ease; }
    </style>
</head>
<body class="p-4 md:p-8 flex items-center justify-center min-h-screen">

    <div class="max-w-md w-full bg-gray-900 border border-orange-900/40 rounded-2xl p-6 text-center shadow-2xl glow-effect relative overflow-hidden">
        
        <a href="index.html" class="absolute top-4 left-4 text-gray-500 hover:text-orange-400 transition text-sm flex items-center gap-1">
            <i class="fa-solid fa-arrow-left"></i> Back
        </a>

        <div class="mb-6 mt-4">
            <img src="naruto.png" alt="Om - Naruto" class="w-full h-52 object-cover rounded-xl border border-orange-500/30 shadow-md">
        </div>

        <h1 class="text-3xl font-extrabold text-orange-400 tracking-wide uppercase">Om</h1>
        <p class="text-sm font-semibold text-gray-500 mt-1 uppercase tracking-widest">Character: Naruto Uzumaki</p>

        <div class="my-6 border-t border-gray-800/80"></div>

        <div class="bg-gray-950/60 border border-gray-800/60 p-4 rounded-xl">
            <h3 class="text-xs font-bold uppercase text-gray-400 tracking-wider mb-3">
                <i class="fa-solid fa-music text-orange-500 mr-1"></i> Signature Anthem
            </h3>
            
            <audio id="naruto-theme" preload="auto">
                <source src="naruto-theme.mp3" type="audio/mpeg">
                Your browser does not support the audio element.
            </audio>

            <button onclick="toggleTheme()" id="play-btn" class="w-full bg-gradient-to-r from-orange-600 to-orange-700 hover:from-orange-500 hover:to-orange-600 text-white font-semibold py-2.5 px-4 rounded-lg shadow-lg flex items-center justify-center gap-2 transition duration-200 uppercase tracking-wider text-xs">
                <i id="btn-icon" class="fa-solid fa-play"></i> <span id="btn-text">Play Theme Song</span>
            </button>
        </div>

        <p class="text-xs font-mono text-gray-600 mt-4 italic">"Dattebayo! I never go back on my word!"</p>
    </div>

    <script>
        const audio = document.getElementById('naruto-theme');
        const btnIcon = document.getElementById('btn-icon');
        const btnText = document.getElementById('btn-text');

        function toggleTheme() {
            if (audio.paused) {
                audio.play().catch(error => {
                    console.error("Playback failed. Ensure your naruto-theme.mp3 file is placed inside the correct folder:", error);
                    alert("Audio file not found! Make sure 'naruto-theme.mp3' is placed in the folder next to this html file.");
                });
                btnIcon.className = "fa-solid fa-pause";
                btnText.innerText = "Pause Theme Song";
            } else {
                audio.pause();
                resetButton();
            }
        }

        audio.onended = function() {
            resetButton();
        };

        function resetButton() {
            btnIcon.className = "fa-solid fa-play";
            btnText.innerText = "Play Theme Song";
        }
    </script>
</body>
</html>
